function pctToColor(pct, maxPct) {
  const t = Math.min(pct / maxPct, 1);
  return `rgb(${Math.round(240-t*237)},${Math.round(249-t*144)},${Math.round(255-t*94)})`;
}
function isLight(pct, maxPct) { return pct / maxPct < 0.35; }

function renderPanel(etfId) {
  const panel = document.getElementById(`panel-${etfId}`);
  const data  = ETF_DATA[etfId];
  const meta  = ETF_META[etfId];
  if (!data || !data.stocks) { panel.innerHTML = '<p style="padding:40px;color:#b91c1c">資料讀取失敗</p>'; return; }

  const topN  = parseInt(document.getElementById(`topN-${etfId}`)?.value || 20);
  const dates = data.dates;
  const stocks = data.stocks.slice(0, topN);
  const latestDate = dates[0];
  const concentration = stocks.slice(0,10).reduce((s,x)=>s+(x.weights[latestDate]||0),0).toFixed(2);

  let html = `<div class="info-bar"><div class="etf-info">
    <div class="etf-stat"><span>代號 </span><strong>${etfId}</strong></div>
    <div class="etf-stat"><span>最新快照 </span><strong>${latestDate}</strong></div>
    <div class="etf-stat"><span>揭露持股 </span><strong>${data.stocks.length} 檔</strong></div>

    <div class="controls"><label>顯示前 <select id="topN-${etfId}" onchange="renderPanel('${etfId}')">

      <option value="30">30 檔</option><option value="${data.stocks.length}">全部 ${data.stocks.length} 檔</option>
    </select></label></div></div></div>
  <div class="heatmap-wrapper"><div class="heatmap-scroll"><table><thead><tr>
  <th><div style="color:#94a3b8;font-size:0.75rem;">股票</div></th>`;

  for (const d of dates) {

    html+=`<th><div class="date-label"><div>${mon}/${day}${isL?" ★":""}</div><div class="day">週${dow}</div>${isL?'<span class="latest-mark">最新</span>':""}</div></th>`;
  }

  for (const stock of stocks) {

      const val=stock.weights[d];
      if(val===undefined||val===null) html+=`<td><span class="cell-null">—</span></td>`;
      else html+=`<td style="background:${pctToColor(val,meta.maxPct)}" data-stock="${stock.code} ${stock.name}" data-date="${d}" data-val="${val}" onmouseenter="showTip(event)" onmousemove="moveTip(event)" onmouseleave="hideTip()"><span class="cell-val ${isLight(val,meta.maxPct)?"light":""}">${val.toFixed(2)}%</span></td>`;

  panel.innerHTML = html;
}

function switchTab(etfId) {
  activeTab=etfId;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  document.getElementById(`tab-${etfId}`).classList.add("active");
  document.getElementById(`panel-${etfId}`).classList.add("active");
  if (!document.getElementById(`panel-${etfId}`).querySelector("table")) renderPanel(etfId);
}
